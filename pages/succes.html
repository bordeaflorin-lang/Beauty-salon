<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programare trimisă</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

.success-box{
    max-width:600px;
    text-align:center;
    padding:40px;
    background:#1b1b1b;
    border:1px solid #c9a84c;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.success-icon{
    width:90px;
    height:90px;
    margin:0 auto 20px;
    border-radius:50%;
    background:#c9a84c;
    display:flex;
    align-items:center;
    justify-content:center;
}

.success-icon svg{
    width:50px;
    height:50px;
    stroke:#111;
    fill:none;
}

h1{
    color:#c9a84c;
    margin-bottom:15px;
}

p{
    color:#ddd;
    margin-bottom:25px;
}

.btn-home{
    display:inline-block;
    padding:12px 30px;
    background:#c9a84c;
    color:#111;
    text-decoration:none;
    font-weight:700;
    border-radius:10px;
    transition:.3s;
}

.btn-home:hover{
    transform:translateY(-2px);
}
</style>
</head>
<body>

<div class="success-box">

    <div class="success-icon">
        <svg viewBox="0 0 24 24" stroke-width="2">
            <polyline points="20 6 9 17 4 12"
                stroke-linecap="round"
                stroke-linejoin="round"/>
        </svg>
    </div>

    <h1>Programare trimisă cu succes!</h1>

    <p>
        Cererea ta a fost înregistrată.
        Te vom contacta în cel mai scurt timp pentru confirmarea programării.
    </p>

    <a href="../index.html" class="btn-home">
        Înapoi la pagina principală
    </a>

</div>

</body>
</html>
